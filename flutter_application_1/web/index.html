<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="TokyoNihongo - Ứng dụng học tiếng Nhật">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="TokyoNihongo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TokyoNihongo</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- ═══════════════════════════════════════════════════════
       Firebase Web SDK
       Điền YOUR_... bằng giá trị từ Firebase Console
       Project Settings → Your apps → Web → SDK setup
       ═══════════════════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "YOUR_WEB_API_KEY",
      authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_PROJECT_ID.firebasestorage.app",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_WEB_APP_ID"
    };

    // Khởi tạo Firebase cho Web
    const app = initializeApp(firebaseConfig);
    getAuth(app);
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
